<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Management</title>
    <style>
        :root {
            --primary: #2c3e50;
            --primary-light: #34495e;
            --accent: #3498db;
            --accent-soft: #ecf6fd;
            --danger: #e74c3c;
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --border: #dfe4ea;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
            Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text-main);
        }

        .page-wrapper {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 16px;
        }

        h1 {
            margin: 0 0 16px;
            font-size: 28px;
            color: var(--primary);
        }

        h2 {
            margin: 24px 0 12px;
            font-size: 20px;
            color: var(--primary);
        }

        .subtitle {
            margin-bottom: 24px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            padding: 20px 24px 24px;
            margin-bottom: 24px;
        }

        /* Form styles */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        input[type="text"],
        input[type="number"] {
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.15);
        }

        .btn-primary {
            display: inline-block;
            margin-top: 16px;
            padding: 8px 18px;
            border-radius: 999px;
            border: none;
            background-color: var(--accent);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.15s ease, box-shadow 0.15s ease;
        }

        .btn-primary:hover {
            background-color: #2380c6;
            box-shadow: 0 2px 6px rgba(35, 128, 198, 0.35);
        }

        /* Table styles */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            font-size: 14px;
        }

        thead {
            background: var(--primary);
            color: #fff;
        }

        th, td {
            padding: 10px 12px;
            text-align: left;
        }

        th {
            font-weight: 600;
            border-bottom: 1px solid var(--primary-light);
        }

        tbody tr:nth-child(even) {
            background-color: #f9fbff;
        }

        tbody tr:nth-child(odd) {
            background-color: #ffffff;
        }

        tbody tr:hover {
            background-color: var(--accent-soft);
        }

        td {
            border-bottom: 1px solid var(--border);
        }

        .rating {
            font-weight: 600;
            color: #f39c12;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            background-color: #eafaf1;
            color: #1e8449;
            font-size: 12px;
        }

        .actions {
            white-space: nowrap;
        }

        .btn-link {
            display: inline-block;
            padding: 4px 10px;
            margin-right: 6px;
            border-radius: 999px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        .btn-edit {
            background-color: var(--accent-soft);
            color: var(--accent);
        }

        .btn-edit:hover {
            background-color: var(--accent);
            color: #fff;
        }

        .btn-delete {
            background-color: #fdecea;
            color: var(--danger);
        }

        .btn-delete:hover {
            background-color: var(--danger);
            color: #fff;
        }

        @media (max-width: 768px) {
            .page-wrapper {
                margin: 20px auto;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            table, thead, tbody, th, td, tr {
                font-size: 13px;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
<div class="page-wrapper">
    <h1>Restaurant Management</h1>
    <p class="subtitle">Add a new restaurant.</p>

    <!-- Form Card -->
    <div class="card">
        <h2>Add Restaurant</h2>

        <!-- must match controller: model.addAttribute("restuarent", new Restuarent()) -->
        <form th:action="@{/save}" th:object="${restuarent}" method="post">
            <div class="form-grid">
                <input type="hidden" th:field="*{id}"/>

                <div class="form-group">
                    <label for="name">Name</label>
                    <input id="name" type="text" th:field="*{name}" placeholder="Restaurant name" required/>
                </div>

                <div class="form-group">
                    <label for="location">Location</label>
                    <input id="location" type="text" th:field="*{location}" placeholder="City / Area" required/>
                </div>

                <div class="form-group">
                    <label for="rating">Rating</label>
                    <input id="rating" type="number" step="0.1" min="0" max="5"
                           th:field="*{rating}" placeholder="e.g. 4.5"/>
                </div>

                <div class="form-group">
                    <label for="cuisine">Cuisine</label>
                    <input id="cuisine" type="text" th:field="*{cuisine}"
                           placeholder="e.g. Indian, Italian, Chinese"/>
                </div>
            </div>

            <button type="submit" class="btn-primary">Save Restaurant</button>
        </form>

        <!-- back to list -->
        <p style="margin-top: 16px;">
            <a th:href="@{/}">Back to list</a>
        </p>
    </div>
</div>
</body>
</html>
